</div>
<!-- /wp:html -->
<!-- wp:html -->

  <button type="button" class="pill is-active" data-view="list">List</button>
  <button type="button" class="pill" data-view="grid">Grid</button>
</div>
<!-- /wp:html -->
</div>
<!-- /wp:group -->

<!-- wp:group {"className":"e-calendar__body","layout":{"type":"default"}} -->

<!-- wp:query {"queryId":32,"query":{"perPage":40,"pages":0,"offset":0,"postType":"event","order":"asc","orderBy":"date","author":"","search":"","exclude":[],"sticky":"","inherit":false}} -->

<!-- wp:html -->
<script>
(() => {
  const root = document.querySelector('[data-calendar-root]');
  if (!root) return;
  const rows = [...root.querySelectorAll('.e-calendar__row')];

  // Tag each row with its show type by reading the first (non-room) tag text
  rows.forEach((row) => {
    const typeEl = row.querySelector('.e-calendar__tag:not(.is-room)');
    const roomEl = row.querySelector('.e-calendar__tag.is-room');
    const type = (typeEl?.textContent || '').trim().toLowerCase();
    if (type) {
      row.dataset.type = type;
      typeEl.classList.add('is-' + type);
    }
    // Also promote room class variant for styling
    if (roomEl) {
      const room = (roomEl.textContent || '').trim().toLowerCase().replace(/\s+/g, '-');
      if (room) roomEl.dataset.room = room;
    }
  });

  // Filter pills
  const filterEls = root.querySelectorAll('[data-filter]');
  filterEls.forEach((pill) => {
    pill.addEventListener('click', () => {
      filterEls.forEach((p) => p.classList.remove('is-active'));
      pill.classList.add('is-active');
      const f = pill.dataset.filter;
      rows.forEach((r) => {
        r.hidden = !(f === 'all' || r.dataset.type === f);
      });
    });
  });

  // List / Grid toggle
  const viewEls = root.querySelectorAll('[data-view]');
  const body = root.querySelector('[data-calendar-body]');
  viewEls.forEach((btn) => {
    btn.addEventListener('click', () => {
      viewEls.forEach((b) => b.classList.remove('is-active'));
      btn.classList.add('is-active');
      body.dataset.view = btn.dataset.view;
    });
  });
})();
</script>
<!-- /wp:html -->

</div>
<!-- /wp:group -->
